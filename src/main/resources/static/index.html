<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepMate | Dark Mode</title>
    <style>
        :root { 
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --primary: #8b5cf6;
            --primary-glow: 0 0 15px rgba(139, 92, 246, 0.6);
            --correct: #10b981;
            --wrong: #ef4444;
            --border: #334155;
            --muted: #94a3b8;
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); max-width: 900px; margin: 0 auto; padding: 30px; line-height: 1.6; }
        
        h1 { text-align: center; color: var(--primary); font-size: 2.8rem; margin-bottom: 5px; font-weight: 900; text-shadow: var(--primary-glow); letter-spacing: 2px;}
        h1 span { color: var(--text); text-shadow: none; }
        p.subtitle { text-align: center; color: var(--muted); margin-bottom: 40px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px;}
        
        .card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); margin-bottom: 25px; border: 1px solid var(--border); transition: transform 0.2s; }
        .card:hover { border-color: #475569; }
        .card h3 { margin-top: 0; color: var(--primary); font-size: 1.4rem; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        
        .btn { background-color: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.2s; width: 100%; text-transform: uppercase; letter-spacing: 1px;}
        .btn:hover { background-color: #7c3aed; box-shadow: var(--primary-glow); transform: translateY(-2px); }
        .btn:disabled { background-color: var(--border); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-secondary { background-color: var(--border); margin-top: 10px; width: auto; color: var(--text);}
        .btn-secondary:hover { background-color: #475569; }
        
        .file-upload-wrapper { margin: 15px 0; padding: 20px; border: 2px dashed var(--border); border-radius: 8px; text-align: center; background: rgba(0,0,0,0.2); transition: 0.2s; }
        .file-upload-wrapper:hover { border-color: var(--primary); }
        
        #uploadStatus { margin-top: 15px; font-weight: bold; text-align: center; }

        .hud { display: none; justify-content: space-between; align-items: center; background: #000; padding: 15px 25px; border-radius: 12px; border: 1px solid var(--primary); box-shadow: var(--primary-glow); margin-bottom: 25px; position: sticky; top: 10px; z-index: 100;}
        .stat { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .xp-text { color: #f59e0b; }
        .streak-text { color: #ef4444; }
        
        .progress-container { width: 100%; height: 8px; background: var(--border); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), #d946ef); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .section-title { font-size: 1.2rem; font-weight: bold; background: rgba(139, 92, 246, 0.1); color: var(--primary); padding: 10px 15px; border-radius: 8px; margin: 30px 0 15px 0; border-left: 5px solid var(--primary);}
        .question-block { margin-bottom: 30px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .question-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: var(--text); }
        
        .option { display: block; background: var(--card); padding: 14px 18px; margin: 8px 0; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; font-weight: 500; }
        .option:hover { border-color: var(--primary); transform: translateX(5px); }
        .option.correct { background: rgba(16, 185, 129, 0.1); border-color: var(--correct); color: var(--correct); box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        .option.wrong { background: rgba(239, 68, 68, 0.1); border-color: var(--wrong); color: var(--wrong); animation: shake 0.4s; }
        
        .explanation { margin-top: 15px; padding: 15px; background: rgba(245, 158, 11, 0.1); border-radius: 8px; border-left: 4px solid #f59e0b; display: none; color: #fcd34d; }
        
        .long-q-block { background: rgba(139, 92, 246, 0.05); padding: 20px; border-radius: 12px; border: 1px solid var(--border); border-left: 5px solid #d946ef; }
        .rubric-list { margin-top: 15px; display: none; padding: 20px; background: var(--card); border-radius: 8px; border: 1px dashed #d946ef; list-style-type: none; }
        .rubric-list li { margin-bottom: 10px; color: #e879f9; font-weight: 500;}

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .pop-anim { animation: pop 0.3s ease-out; }

        .loader { display: none; text-align: center; margin: 20px 0; }
        .spinner { border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>🧠 PrepMate</h1>
    <p class="subtitle">Level Up Your Knowledge</p>

    <div class="card">
        <h3>📚 1. Load Knowledge Base</h3>
        <p style="color: var(--muted)">Upload your course syllabus PDF to train the AI engine.</p>
        <form id="uploadForm">
            <div class="file-upload-wrapper">
                <input type="file" id="pdfFile" accept="application/pdf" style="color:var(--text)" required>
            </div>
            <button type="submit" class="btn" id="uploadBtn">Sync Data to Core</button>
        </form>
        <div id="uploadStatus"></div>
    </div>

    <div class="card">
        <h3>⚔️ 2. Enter the Arena</h3>
        <p style="color: var(--muted)">Generate a 5-topic mock exam. Upload a PYQ to set the difficulty level.</p>
        
        <div class="file-upload-wrapper">
            <label for="pyqFile" style="font-weight: bold; color: var(--muted);">Upload PYQ PDF (Optional):</label><br><br>
            <input type="file" id="pyqFile" accept="application/pdf" style="color:var(--text)">
        </div>
        
        <button id="generateBtn" class="btn">🚀 Start Mock Exam</button>
        
        <div id="quizLoader" class="loader">
            <div class="spinner"></div>
            <p style="color: var(--primary); font-weight: bold;">Generating Exam Protocol...</p>
        </div>
    </div>

    <div id="hud" class="hud">
        <div class="stat xp-text">⭐ XP: <span id="scoreVal">0</span></div>
        <div class="stat streak-text">🔥 Streak: <span id="streakVal">0</span></div>
    </div>
    <div id="hudProgress" class="progress-container" style="display:none; margin-bottom: 20px;">
        <div id="progressBar" class="progress-bar"></div>
    </div>

    <div id="quizContainer"></div>

    <script>
        let currentXP = 0;
        let currentStreak = 0;
        let answeredQuestions = 0;
        let totalQuestions = 0;

        function updateHUD() {
            const scoreEl = document.getElementById('scoreVal');
            const streakEl = document.getElementById('streakVal');
            const progressEl = document.getElementById('progressBar');
            
            scoreEl.innerText = currentXP;
            streakEl.innerText = currentStreak;
            
            scoreEl.classList.remove('pop-anim');
            void scoreEl.offsetWidth; 
            scoreEl.classList.add('pop-anim');

            if(totalQuestions > 0) {
                const percent = (answeredQuestions / totalQuestions) * 100;
                progressEl.style.width = percent + '%';
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('pdfFile');
            const uploadBtn = document.getElementById('uploadBtn');
            const statusText = document.getElementById('uploadStatus');

            if (fileInput.files.length === 0) return;
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            uploadBtn.disabled = true;
            uploadBtn.innerText = "Syncing...";
            statusText.innerText = "Processing syllabus... Please wait.";
            statusText.style.color = "#f59e0b";

            try {
                const response = await fetch('/api/syllabus/upload', { method: 'POST', body: formData });
                if (response.ok) {
                    statusText.innerText = "✅ Knowledge Base Synced Successfully!";
                    statusText.style.color = "var(--correct)";
                } else {
                    const errorMsg = await response.text();
                    statusText.innerText = "❌ System Error: " + errorMsg;
                    statusText.style.color = "var(--wrong)";
                }
            } catch (error) {
                statusText.innerText = "❌ Network Disconnected!";
                statusText.style.color = "var(--wrong)";
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerText = "Sync Data to Core";
            }
        });

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const generateBtn = document.getElementById('generateBtn');
            const pyqInput = document.getElementById('pyqFile');
            const loader = document.getElementById('quizLoader');
            const container = document.getElementById('quizContainer');
            const hud = document.getElementById('hud');
            const hudProg = document.getElementById('hudProgress');

            generateBtn.disabled = true;
            container.innerHTML = ""; 
            hud.style.display = "none";
            hudProg.style.display = "none";
            loader.style.display = "block"; 

            currentXP = 0;
            currentStreak = 0;
            answeredQuestions = 0;
            
            const formData = new FormData();
            if (pyqInput.files.length > 0) formData.append("pyqFile", pyqInput.files[0]);

            try {
                const response = await fetch('/api/quiz/exam', { method: 'POST', body: formData });
                if (!response.ok) throw new Error(await response.text());

                const examData = await response.json(); 
                
                hud.style.display = "flex";
                hudProg.style.display = "block";
                
                totalQuestions = examData.mcqs ? examData.mcqs.length : 0;
                updateHUD();

                renderExam(examData);

            } catch (error) {
                container.innerHTML = `<div class="card"><p style="color:var(--wrong); font-weight:bold;">Error: ${error.message}</p></div>`;
            } finally {
                generateBtn.disabled = false;
                loader.style.display = "none";
            }
        });

        function renderExam(data) {
            const container = document.getElementById('quizContainer');
            let html = ``;

            if (data.mcqs && data.mcqs.length > 0) {
                html += `<div class="section-title">Stage 1: Rapid Fire (MCQs)</div><div id="mcqContainer"></div>`;
            }
            
            if (data.longQuestion) {
                html += `<div class="section-title" style="background: rgba(217, 70, 239, 0.1); color: #d946ef; border-left-color: #d946ef;">Boss Stage: Descriptive (7 Marks)</div>
                         <div class="long-q-block">
                            <div class="question-text">${data.longQuestion.question}</div>
                            <button class="btn btn-secondary" onclick="document.getElementById('rubric').style.display='block'">Reveal Boss Weaknesses (Rubric)</button>
                            <ul id="rubric" class="rubric-list">
                                ${data.longQuestion.gradingRubric.map(point => `<li>⚔️ ${point}</li>`).join('')}
                            </ul>
                         </div>`;
            }
            
            container.innerHTML = html;

            if (data.mcqs) {
                const mcqContainer = document.getElementById('mcqContainer');
                data.mcqs.forEach((q, index) => {
                    const qBlock = document.createElement('div');
                    qBlock.className = 'question-block';
                    qBlock.innerHTML = `<div class="question-text">Q${index + 1}. ${q.question}</div>`;

                    q.options.forEach(optText => {
                        const optDiv = document.createElement('div');
                        optDiv.className = 'option';
                        optDiv.innerText = optText;

                        optDiv.onclick = () => {
                            if (qBlock.querySelector('.correct') || qBlock.querySelector('.wrong')) return; 

                            answeredQuestions++;
                            const explanationDiv = qBlock.querySelector('.explanation');
                            
                            if (optText === q.answer) {
                                optDiv.classList.add('correct');
                                currentStreak++;
                                currentXP += (100 + (currentStreak * 20));
                            } else {
                                optDiv.classList.add('wrong');
                                currentStreak = 0; 
                                qBlock.querySelectorAll('.option').forEach(o => {
                                    if(o.innerText === q.answer) {
                                        o.classList.add('correct');
                                        o.style.opacity = '0.7'; 
                                    }
                                });
                            }
                            
                            updateHUD();
                            explanationDiv.style.display = "block"; 
                        };
                        qBlock.appendChild(optDiv);
                    });

                    const expDiv = document.createElement('div');
                    expDiv.className = 'explanation';
                    expDiv.innerHTML = `<strong>💡 Intel Data:</strong> ${q.explanation}`;
                    qBlock.appendChild(expDiv);

                    mcqContainer.appendChild(qBlock);
                });
            }

            const loopBtn = document.createElement('button');
            loopBtn.className = 'btn';
            loopBtn.style.marginTop = '40px';
            loopBtn.style.marginBottom = '20px';
            loopBtn.style.background = 'linear-gradient(90deg, var(--primary), #d946ef)'; 
            loopBtn.innerHTML = '🔁 Generate Next Exam';
            
            loopBtn.onclick = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                document.getElementById('generateBtn').click();
            };
            
            container.appendChild(loopBtn);
        }
    </script>
</body>
</html>

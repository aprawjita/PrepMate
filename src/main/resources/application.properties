spring.application.name=PrepMate
# Database URL (5432 is default for Postgres)
spring.datasource.url=jdbc:postgresql://localhost:5432/PrepMate
spring.datasource.username=postgres
spring.datasource.password=admin123

# JPA / Hibernate settings
# 'update' will automatically create/update tables based on your Java classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.azure.autoconfigure.AzureVectorStoreAutoConfiguration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Gemini AI Configuration

google.api.key=${GOOGLE_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent